<div class="gcb" role="region" aria-label="Registracija">
  <div class="gcb__content">
    <p class="gcb__text">
      Registrujte se i pratite omiljene biznise, čuvajte popuste i budite prvi obavešteni.
    </p>
    <div class="gcb__actions">
      <a routerLink="/auth/register" class="btn-primary gcb__cta">Registruj se besplatno</a>
      <a routerLink="/auth/login" class="gcb__login">Već imam nalog</a>
    </div>
  </div>
  <button class="gcb__dismiss" (click)="dismiss()" aria-label="Zatvori">&#x2715;</button>
</div>
