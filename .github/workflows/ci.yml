# ============================================
# LOKALNO Frontend - Continuous Integration
# ============================================
# Runs on: push to main/develop, pull requests
# Steps: lint + type check, unit tests, production build
# ============================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

jobs:
  # ============================================
  # Lint & Type Check
  # ============================================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create environment files
        env:
          MAPBOX_TOKEN: ${{ secrets.MAPBOX_TOKEN }}
        run: |
          sed "s/YOUR_MAPBOX_TOKEN/${MAPBOX_TOKEN}/" src/environments/environment.example.ts > src/environments/environment.ts
          sed "s/YOUR_MAPBOX_TOKEN/${MAPBOX_TOKEN}/" src/environments/environment.prod.example.ts > src/environments/environment.prod.ts

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript check
        run: npx tsc --noEmit

  # ============================================
  # Unit Tests
  # ============================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create environment files
        env:
          MAPBOX_TOKEN: ${{ secrets.MAPBOX_TOKEN }}
        run: |
          sed "s/YOUR_MAPBOX_TOKEN/${MAPBOX_TOKEN}/" src/environments/environment.example.ts > src/environments/environment.ts
          sed "s/YOUR_MAPBOX_TOKEN/${MAPBOX_TOKEN}/" src/environments/environment.prod.example.ts > src/environments/environment.prod.ts

      - name: Run unit tests
        run: npm test -- --ci --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage/lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ============================================
  # Production Build Check
  # ============================================
  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create environment files
        env:
          MAPBOX_TOKEN: ${{ secrets.MAPBOX_TOKEN }}
        run: |
          sed "s/YOUR_MAPBOX_TOKEN/${MAPBOX_TOKEN}/" src/environments/environment.example.ts > src/environments/environment.ts
          sed "s/YOUR_MAPBOX_TOKEN/${MAPBOX_TOKEN}/" src/environments/environment.prod.example.ts > src/environments/environment.prod.ts

      - name: Build for production
        run: npm run build -- --configuration=production

      - name: Verify build output
        run: |
          if [ ! -d "dist" ]; then
            echo "Build failed: dist directory not found"
            exit 1
          fi
          echo "Build successful!"
          du -sh dist/

  # ============================================
  # Playwright E2E Tests
  # ============================================
  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Create environment files
        env:
          MAPBOX_TOKEN: ${{ secrets.MAPBOX_TOKEN }}
        run: |
          sed "s/YOUR_MAPBOX_TOKEN/${MAPBOX_TOKEN}/" src/environments/environment.example.ts > src/environments/environment.ts
          sed "s/YOUR_MAPBOX_TOKEN/${MAPBOX_TOKEN}/" src/environments/environment.prod.example.ts > src/environments/environment.prod.ts

      - name: Seed E2E test data on staging
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /app/lokalno-backend
            E2E_ADMIN_PASSWORD="${{ secrets.E2E_ADMIN_PASSWORD }}" npm run seed:e2e

      - name: Run Playwright tests
        run: npx playwright test
        env:
          E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
          E2E_API_URL: ${{ secrets.E2E_API_URL }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
